events {}

http {
    # Docker's embedded DNS — lets us re-resolve the "agent" service name on
    # each request so traffic round-robins across all scaled replicas.
    resolver 127.0.0.11 valid=10s;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 80;

        location / {
            # Variable proxy_pass forces per-request DNS resolution (load balancing
            # across `docker compose up --scale agent=N`).
            set $upstream http://agent:8000;
            proxy_pass $upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_read_timeout    30s;
        }
    }
}
